<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />

  <title>NOC Report Generator</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- ICON -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- SWEET ALERT -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- CSS -->
  <link href="style.css" rel="stylesheet" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00ADB5" />
  <link rel="icon" href="noc-logo.png"/>
  <link rel="apple-touch-icon" href="noc-logo.png"/>
  <meta name="theme-color" content="#00ADB5""/>
  


</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="text-center mb-4">
    <div class="main-title">
      <i class="bi bi-shield-check"></i>
      NOC Report Generator
    </div>
    <div class="sub-title">
      Generate Template WhatsApp, Email & Uptime Monitoring
    </div>
  </div>

  <div class="row g-4 align-items-start">

    <!-- LEFT -->
    <div class="col-lg-6">

      <!-- FORM DOWN -->
      <div class="glass-card mb-4">

        <div class="form-section-title">
          <span class="badge-custom">
            <i class="bi bi-exclamation-triangle-fill"></i>
            FORM DOWN
          </span>
        </div>

        <div class="mb-3">
          <label class="form-label">Kendala / Gangguan</label>
          <input class="form-control" id="gangguan" list="gangguanList" 
          placeholder="Pilih atau ketik Kendala / Gangguan..."/>
        </div>

        <datalist id="gangguanList">
          <option value="Server"></option>
          <option value="Network"></option>
          <option value="API"></option>
          <option value="Aplikasi"></option>
        </datalist>

        <div class="mb-3">
          <label class="form-label">Cabang</label>
          <input class="form-control" id="cabang" list="cabangList" 
           placeholder="Pilih atau ketik Cabang..."/>
        </div>

        <datalist id="cabangList">
          <option value="HO"></option>
          <option value="Jakarta"></option>
          <option value="Tangerang"></option>
          <option value="Bandung"></option>
          <option value="Surabaya"></option>
          <option value="Semarang"></option>
          <option value="Palembang"></option>
          <option value="Denpasar"></option>
          <option value="Samarinda"></option>
          <option value="Banjarmasin"></option>
          <option value="Pekanbaru"></option>
          <option value="Cabang Planetban"></option>
        </datalist>

        <div class="mb-3">
          <label class="form-label">No Ticket</label>
          <input class="form-control" id="ticket" type="text" 
          placeholder="Jangan lupa tiket, Paket # juga ya..."/>
        </div>

        <div class="mb-3">
          <label class="form-label">Waktu Down (24 jam, contoh 15:30)</label>
          <input
            class="form-control"
            id="waktu"
            type="text"
            inputmode="numeric"
            placeholder="2026-05-20 15:30"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="form-text" style="color:#9ca3af">Format: YYYY-MM-DD HH:mm (24 jam)</div>
        </div>

       <div class="mb-3">
            <label class="form-label">Laporan Kendala</label>
            <input class="form-control" id="kendala" list="kendalaList"
              placeholder="Pilih atau ketik..." />

            <datalist id="kendalaList">
              <option value="Koneksi akses internet Intermitten"></option>
              <option value="Koneksi akses server Intermitten"></option>
            </datalist>
          </div>

          <div class="mb-3">
            <label class="form-label">Impact / Jenis Gangguan</label>
            <input class="form-control" id="impact" list="impactList"
              placeholder="Pilih atau ketik impact..." />

            <datalist id="impactList">
              <option value="User mengalami gangguan dalam layanan"></option>
              <option value="Pengguna/toko mengalami gangguan dalam layanan"></option>
            </datalist>
          </div>
            
       <div class="mb-3">
            <label class="form-label">Indikasi Penyebab</label>
            <input class="form-control" id="penyebab" list="penyebabList"
              placeholder="Pilih atau ketik..." />

            <datalist id="penyebabList">
              <option value="Saat ini masih dalam pengecekan oleh ISP dan Tim terkait"></option>
              <option value="Saat ini masih dalam pengecekan oleh Tim terkait"></option>
            </datalist>
          </div>

       <div class="mb-3">
            <label class="form-label">Status</label>
            <input class="form-control" id="status" list="statusList"
              placeholder="Pilih atau ketik status..." />

            <datalist id="statusList">
              <option value="Network Link Down Cabang Jakarta"></option>
              <option value="Network Link Down Cabang Tangerang"></option>
              <option value="Network Link Down Cabang Bandung"></option>
              <option value="Network Link Down Cabang Surabaya"></option>
              <option value="Network Link Down Cabang Semarang"></option>
              <option value="Network Link Down Cabang Palembang"></option>
              <option value="Network Link Down Cabang Denpasar"></option>
              <option value="Network Link Down Cabang Samarinda"></option>
              <option value="Network Link Down Cabang Banjarmasin"></option>
              <option value="Network Link Down Cabang Pekanbaru"></option>
              <option value="Sedang Dalam Pengecekan"></option>
            </datalist>
          </div>

      <div class="mb-4">
            <label class="form-label">PIC NOC</label>
            <input class="form-control" id="picnoc" list="picList"
              placeholder="Pilih atau ketik PIC..." />

            <datalist id="picList">
              <option value="Namit"></option>
              <option value="Khairul"></option>
              <option value="Bagas"></option>
              <option value="Padli"></option>
              <option value="Ridho"></option>
            </datalist>
          </div>


       <div class="d-flex gap-2 justify-content-end flex-wrap">

  <button class="btn btn-warning-modern btn-modern" onclick="buatWA()">
    <i class="bi bi-whatsapp me-1"></i>
    Generate WA
  </button>

  <button class="btn btn-success-modern btn-modern" onclick="buatEmail()">
    <i class="bi bi-envelope-fill me-1"></i>
    Generate Email
  </button>

  <button class="btn btn-primary btn-modern" onclick="buatUpdateInfo()">
    <i class="bi bi-arrow-repeat me-1"></i>
    Update Info
  </button>

</div>
      
      </div>

      <!-- UPTIME -->
      <div class="glass-card">

        <div class="form-section-title">
          <span class="badge-custom badge-warning">
            <i class="bi bi-arrow-up-circle-fill"></i>
            FORM UPTIME
          </span>
        </div>

        <div class="mb-3">
          <label class="form-label">Up Time (24 jam)</label>
          <input
            class="form-control"
            id="uptime"
            type="text"
            inputmode="numeric"
            placeholder="2026-05-20 15:30"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="form-text" style="color:#9ca3af">Format: YYYY-MM-DD HH:mm (24 jam)</div>
        </div>

        <div class="mb-4">
          <label class="form-label">Tindakan</label>
          <input class="form-control" id="tindakan" type="text" 
           placeholder="Ketik tindakan..."/>
        </div>
<div class="d-flex gap-2 justify-content-end flex-wrap">

  <button class="btn btn-modern btn-warning-modern" onclick="buatUptimeWA()">
    <i class="bi bi-whatsapp me-1"></i>
    Uptime WA
  </button>

  <button class="btn btn-modern btn-success-modern" onclick="buatUptimeEmail()">
    <i class="bi bi-envelope-fill me-1"></i>
    Uptime Email
  </button>

  <button class="btn btn-modern btn-danger-modern" onclick="clearForm()">
    <i class="bi bi-trash-fill me-1"></i>
    Clear Form
  </button>

</div>
      </div>

    </div>

    <!-- KANAN -->
<div class="col-lg-6">

  <div class="glass-card h-100">

    <h4 class="form-section-title mb-4">
      <i class="bi bi-file-earmark-text"></i>
      Output Template
    </h4>

    <!-- SUBJECT EMAIL -->
    <div class="mb-4">

      <label class="form-label">
        <i class="bi bi-tag-fill me-1"></i>
        Email Subject
      </label>

      <div class="copy-btn-group mb-2">
        <button class="btn btn-success-modern btn-modern" onclick="copySubject()">
          <i class="bi bi-copy me-1"></i>
          Copy Subject
        </button>
      </div>

      <textarea 
        class="form-control"
        id="emailSubject"
        rows="2"
        placeholder="Email subject..."
      ></textarea>

    </div>

    <!-- EMAIL OUTPUT -->
    <div class="mb-4">

      <label class="form-label">
        <i class="bi bi-envelope-fill me-1"></i>
        Email Tujuan
      </label>

      <div class="copy-btn-group mb-2">
        <button class="btn btn-success-modern btn-modern" onclick="copyEmail()">
          <i class="bi bi-copy me-1"></i>
          Copy Email
        </button>
      </div>

      <textarea
        class="form-control"
        id="emailOutput"
        rows="5"
        readonly
        placeholder="Email recipient..."
      ></textarea>

    </div>

    <!-- TEMPLATE OUTPUT -->
    <div class="mb-3">

      <label class="form-label">
        <i class="bi bi-file-text-fill me-1"></i>
        Template Output
      </label>

      <div class="copy-btn-group mb-2">
        <button class="btn btn-success-modern btn-modern" onclick="copyText()">
          <i class="bi bi-copy me-1"></i>
          Copy Template
        </button>
      </div>

      <textarea
        class="form-control"
        id="hasil"
        rows="20"
        placeholder="Generated template..."
      ></textarea>

    </div>

  </div>

</div>

  <div class="text-center mt-4">
    <small style="color:#9ca3af">
      NOC Report Generator © 2026 — PlanetBan
    </small>
  </div>

</div>

<script src="script.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then(() => console.log("PWA Ready"));
  }
</script>
</body>
</html>
